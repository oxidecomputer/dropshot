#
# Configuration for GitHub-based CI, based on the stock GitHub Rust config.
#
name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-style:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Report cargo version
        run: cargo --version
      - name: Report rustfmt version
        run: cargo fmt -- --version
      - name: Check style
        run: cargo fmt -- --check

  clippy-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Report cargo version
        run: cargo --version
      - name: Report Clippy version
        run: cargo clippy -- --version
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: false # See Swatinem/rust-cache#341.
      - name: Run Clippy Lints
        run: cargo clippy --all-targets -- --deny warnings

  check-docs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Report cargo version
        run: cargo --version
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: false # See Swatinem/rust-cache#341.
      - name: Check Docs
        run: cargo doc --no-deps --lib --bins --examples

  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-14 for M1 runners
        os: [ubuntu-22.04, windows-2022, macos-14]
        toolchain: ["", "1.85.0"] # "" uses rust-toolchain.toml
        features: [all, default]
        include:
          - features: all
            feature_flags: --all-features
          - toolchain: 1.85.0
            cargo_toolchain: +1.85.0
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Install Rust toolchain
        run: rustup toolchain install --profile default ${{ matrix.toolchain }}
      - name: Report versions
        run: |
          rustup --version
          cargo ${{ matrix.cargo_toolchain }} --version
          rustc ${{ matrix.cargo_toolchain }} --version
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Matrix instances other than OS need to be added to this explicitly
          key: ${{ matrix.features }}-${{ matrix.toolchain }}
          cache-bin: false # See Swatinem/rust-cache#341.
      - name: Build
        run: cargo ${{ matrix.cargo_toolchain }} build ${{ matrix.feature_flags }} --locked --all-targets --verbose
      - name: Run tests
        run: cargo ${{ matrix.cargo_toolchain }} test ${{ matrix.feature_flags }} --locked --all-targets --verbose
